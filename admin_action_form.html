<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Workspace-Ajith Airways</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f1f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .admin-nav {
            background-color: #1f4068;
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .action-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
            margin-top: 40px;
        }
        .action-header {
            border-bottom: 2px solid #f1f4f9;
            padding: 25px 30px;
        }
        .action-body {
            padding: 35px 30px;
        }
    </style>
</head>
<body>

    <nav class="admin-nav d-flex justify-content-between align-items-center">
        <h4 class="m-0 fw-bold text-dark text-capitalize" id="frontend_dynamic_title_node">
             <i class="fas fa-tools me-2 text-primary" id="frontend_dynamic_icon_node"></i><span id="title_text_sink">Admin Workspace Center</span>
        </h4>
        <a href="admin_dashboard.html" class="btn btn-sm btn-outline-light"><i class="fas fa-arrow-left me-1"></i> Admin Operations Menu</a>
    </nav>

    <div class="container d-flex justify-content-center align-items-center flex-grow-1 mb-5">
        <div class="action-card w-100" style="max-width: 850px;">
            
            <div class="action-header bg-light rounded-top">
                <h4 class="m-0 fw-bold text-dark text-capitalize">
                    <title>Ajith Airways - Admin Workspace</title>
                </h4>
                <p class=" fw-bold text-dark text-capitalize m-0 mt-1">Please provide input value(s) below.</p>
            </div>
            
            <div class="action-body">
                
                
            <div id="connect-db-view-panel" style="display:none;">
                <form onsubmit="executeFrontendMockAction(event, 'Successfully Connect with MySQL server')"> 
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label text-dark fw-bold text-secondary">Host :</label>
                            <input type="text" name="db_host" class="form-control py-2" required value="localhost">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label text-dark  fw-bold text-secondary">root : </label>
                            <input type="text" name="db_user" class="form-control py-2" required value="root">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label text-dark  fw-bold text-secondary">MySQL Account Password : </label>
                            <input type="password" name="db_pass" class="form-control py-2" required placeholder="Provide MySQL Password...">
                        </div>
                        <div class="col-12 text-end mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-primary px-5 fw-bold py-2 fs-6">Connect with Database</button>
                        </div>
                    </div>
                </form>
            </div>

            <div id="create-db-view-panel" style="display:none;">
                <form onsubmit="executeFrontendMockAction(event, 'New Database Created Successfully!')">
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-secondary">Enter Database Name :</label>
                            <input type="text" name="database_name" class="form-control py-2" required placeholder="e.g: johnbritto_airlenes" value="johnbritto_airlenes" autocomplete="off">
                        </div>
                        <div class="col-12 text-end mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-success px-5 fw-bold py-2 fs-6">Create DataBase</button>
                        </div>
                    </div>
                </form>
        
            </div>
            
            <div id="create-table-view-panel" style="display:none;">
                <div class="alert alert-light border small py-2 d-inline-block fw-semibold text-secondary mb-4">
                    <i class="fas fa-database text-info me-1"></i> Create Table in <span class="text-dark" id="frontend_active_db_label">johnbritto_airlenes </span>
                </div>
                    <form onsubmit="executeFrontendMockAction(event, 'Table Schema Architecture Instantiated Successfully!')"></form>
                    <div class="row g-3 mb-4">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-secondary">Table Name :</label>
                            <input type="text" name="table_name" class="form-control py-2" required placeholder="future update purpose only" readonly>
                        </div>
                    </div>

                    <h6 class="fw-bold text-secondary border-bottom pb-2 mb-3">Enter Column name and Datatype :</h6>
                    
                    <div id="dynamic-column-generator-root">
                        <div class="row g-2 align-items-center mb-2 field-definition-row">
                            <div class="col-md-5">
                                <input type="text" name="col_name[]" class="form-control form-control-sm py-2" required placeholder="Column Name (e.g., flight_id)" readonly>
                            </div>
                            <div class="col-md-5">
                                <input type="text" name="col_type[]" class="form-control form-control-sm py-2" required placeholder="Data Type (e.g., INT PRIMARY KEY)" readonly>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-sm btn-outline-danger w-100 py-2" onclick="this.parentElement.parentElement.remove()"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="mt-3 mb-4">
                        <button type="button" class="btn btn-sm btn-outline-info fw-bold px-3 py-2" onclick="addNewSchemaInputFieldRow()"><i class="fas fa-plus me-1"></i> Add More Column(s)</button>
                    </div>

                    <div class="text-end border-top pt-3">
                        <button type="submit" class="btn btn-info text-white px-5 fw-bold py-2 fs-6">Create Table</button>
                    </div>
                </form>
        
            </div>
            
            <div id="flight-auto-view-panel" style="display:none;">
                <div class="py-2">
                    <div class="text-center mb-4">
                        <i class="fas fa-robot fa-3x text-warning mb-2"></i>
                        <h5 class="fw-bold text-dark">Flight Schedule - Automation</h5>
                        <p class="text-muted small">Provide all informations below to generate automated 30-day schedules.</p>
                    </div>

                    <form onsubmit="executeFrontendMockAction(event, 'Flight Schedule - Automation Triggered: Generated 30-Day Schedules!')"></form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Flight Number</label>
                                <input type="text" name="flight_no" class="form-control py-2" required placeholder="e.g., AJ1101" value="AJ1101">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Total Available Seats :</label>
                                <input type="number" name="total_available_seats" class="form-control py-2" required placeholder="e.g., 100" value="100">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Origin :</label>
                                <input type="text" name="origine" class="form-control py-2" required placeholder="e.g., chennai" value="chennai">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Destination :</label>
                                <input type="text" name="destination" class="form-control py-2" required placeholder="e.g., mumbai" value="mumbai">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Schedule Date (From Date)</label>
                                <input type="date" name="departure_date" class="form-control py-2" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-secondary">Base Departure Time (24h format)</label>
                                <input type="text" name="departure_time" class="form-control py-2" required placeholder="e.g., 06:00:00" value="06:00:00">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold text-secondary">Base Seat Price :</label>
                                <input type="number" step="0.01" name="base_price" class="form-control py-2" required placeholder="e.g., 5000.00" value="5000.00">
                            </div>

                            <div class="col-12 text-end mt-4 pt-3 border-top">
                                <button type="submit" class="btn btn-warning text-dark px-5 py-2 fw-bold fs-6 shadow-sm">
                                    <i class="fas fa-play me-2"></i>Trigger  Flight Automation 
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

                     
                       

               

            </div>
        </div>
    </div>

    <script>
    function addNewSchemaInputFieldRow() {
        const targetBox = document.getElementById('dynamic-column-generator-root');
        const newFieldsLine = document.createElement('div');
        newFieldsLine.className = 'row g-2 align-items-center mb-2 field-definition-row';
        newFieldsLine.innerHTML = `
            <div class="col-md-5">
                <input type="text" name="col_name[]" class="form-control form-control-sm py-2" required placeholder="Column Name">
            </div>
            <div class="col-md-5">
                <input type="text" name="col_type[]" class="form-control form-control-sm py-2" required placeholder="Data Type Syntax">
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-sm btn-outline-danger w-100 py-2" onclick="this.parentElement.parentElement.remove()"><i class="fas fa-trash-alt"></i></button>
            </div>
        `;
        targetBox.appendChild(newFieldsLine);
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const activeMode = urlParams.get('mode') || 'connect-db';

        // Title and icon custom dictionary mapping rules
        const modeMetadata = {
            'connect-db': { title: 'Connect With Database', icon: 'fas fa-plug' },
            'create-db': { title: 'Create Database Instance', icon: 'fas fa-database' },
            'create-table': { title: 'Create Table Structure Pipeline', icon: 'fas fa-table' },
            'flight-auto': { title: 'Flight Fleet Matrix & Automation Engine', icon: 'fas fa-cogs' }
        };

        // Inject dynamic values cleanly matching the design context
        if (modeMetadata[activeMode]) {
            document.getElementById('title_text_sink').innerText = modeMetadata[activeMode].title;
            document.getElementById('frontend_dynamic_icon_node').className = modeMetadata[activeMode].icon + " me-2 text-primary";
        }

        // Display the specific target form block instantly
        const targetPanel = document.getElementById(activeMode + "-view-panel");
        if (targetPanel) {
            targetPanel.style.display = "block";
        }
    });

    function executeFrontendMockAction(event, successMessage) {
        event.preventDefault(); // 🎯 Stops page from crashing on non-existent backend endpoints!
        alert("Ajith Airways Control Center: " + successMessage);
        window.location.href = "admin_dashboard.html"; // Returns back gracefully
    }

    document.addEventListener("DOMContentLoaded", function() {
    // ... (உன்னோட பழைய activeMode panel checking logic கோடுகள் அப்படியே இருக்கட்டும்) ...

    // 🎯 SNIPER FIX: Automatically computes today's exact date in local timezone YYYY-MM-DD standard format!
    const todayDateInstance = new Date();
    const yearFormatted = todayDateInstance.getFullYear();
    const monthFormatted = String(todayDateInstance.getMonth() + 1).padStart(2, '0'); // Months zero indexed standard fixes
    const dayFormatted = String(todayDateInstance.getDate()).padStart(2, '0');

    const compiledTodayISOString = `${yearFormatted}-${monthFormatted}-${dayFormatted}`;

    // Inject computed dynamic strings directly inside targeting node element values bounds
    const dateInputFieldNode = document.getElementById('frontend_scheduler_current_date_node');
    if (dateInputFieldNode) {
        dateInputFieldNode.value = compiledTodayISOString;
    }
});


    </script>

</body>
</html>
